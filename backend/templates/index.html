<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Based Music Recommender</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <div class="header-container">
        <h1 id="title">Mood-Based Music Recommender 🎵</h1>

        <div class="header-controls">

            <!-- Language -->
            <select id="languageSelector" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="te">Telugu (తెలుగు)</option>
                <option value="hi">Hindi (हिन्दी)</option>
            </select>

            <button onclick="openSettings()">⚙️</button>

        </div>
    </div>
</header>

<main class="container">

    <div class="mood-selector">

        <label id="selectMoodLabel">Select Your Mood:</label>

        <!-- ✅ IMPORTANT: MUST MATCH BACKEND KEYS -->
        <select id="mood">
            <option value="happy">Happy 😊</option>
            <option value="sad">Sad 😢</option>
            <option value="relaxed">Relaxed 😌</option>
            <option value="energetic">Energetic ⚡</option>
        </select>

        <button onclick="getSongs()">
            Get Recommendations
        </button>

    </div>

    <!-- OUTPUT -->
    <div id="output"></div>

</main>

<!-- SETTINGS MODAL -->
<div id="settingsModal" style="display:none;">
    <div class="modal-box">

        <h2>Settings</h2>

        <!-- LANGUAGE -->
        <label>Language</label>
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
        </select>

        <hr>

        <!-- AI PROVIDER -->
        <h3>AI Provider</h3>

        <!-- ⚠️ ONLY "none" WORKS CURRENTLY -->
        <label>
            <input type="radio" name="aiProvider" value="none" checked>
            None
        </label>

        <label>
            <input type="radio" name="aiProvider" value="ollama">
            Ollama
        </label>

        <label>
            <input type="radio" name="aiProvider" value="openai">
            OpenAI
        </label>

        <label>
            <input type="radio" name="aiProvider" value="gemini">
            Gemini
        </label>

        <br><br>

        <button onclick="saveSettings()">Save</button>
        <button onclick="closeSettings()">Close</button>

    </div>
</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
