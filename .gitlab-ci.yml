stages:
  - quality
  - security
  - test

quality:
  stage: quality
  image: python:3.11

  before_script:
    - pip install -r backend/requirements.txt -r requirements-dev.txt

  script:
    - bandit -r backend
    - pylint backend
    - flake8 .
    - semgrep --config .semgrep.yml .

gitleaks_secret_scanning:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.21.2
    entrypoint: [""]

  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact

pip_audit_dependency_audit:
  stage: security
  image: python:3.11

  before_script:
    - pip install --upgrade pip wheel
    - pip install -r requirements-dev.txt

  script:
    - pip-audit

pytest:
  stage: test
  image: python:3.12

  before_script:
    - pip install -r requirements-dev.txt
    - pip install pytest-cov

  script:
    - pytest --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80

  artifacts:
    when: always
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

  coverage: '/TOTAL.*\s+(\d+)%/'