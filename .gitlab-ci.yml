stages:
  - lint
  - type-check
  - format-check
  - quality
  - security
  - test
  - release

ruff_check:
  stage: lint
  image: python:3.12

  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt -r requirements-dev.txt

  script:
    - python -m ruff check backend tests

mypy_check:
  stage: type-check
  image: python:3.12

  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt -r requirements-dev.txt

  script:
    - python -m mypy backend

ruff_format_check:
  stage: format-check
  image: python:3.12

  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt -r requirements-dev.txt

  script:
    - python -m ruff format --check backend tests

quality:
  stage: quality
  image: python:3.11

  before_script:
    - pip install -r backend/requirements.txt -r requirements-dev.txt

  script:
    - bandit -r backend
    - pylint backend
    - flake8 .
    - semgrep --config .semgrep.yml .

gitleaks_secret_scanning:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.21.2
    entrypoint: [""]

  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact

pip_audit_dependency_audit:
  stage: security
  image: python:3.11

  before_script:
    - pip install --upgrade pip wheel
    - pip install -r requirements-dev.txt

  script:
    - pip-audit

pytest:
  stage: test
  image: python:3.12

  before_script:
    - pip install -r requirements-dev.txt
    - pip install pytest-cov

  script:
    - pytest --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80

  artifacts:
    when: always
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

  coverage: '/TOTAL.*\s+(\d+)%/'

release:
  stage: release
  image: python:3.12

  before_script:
    - apt-get update -y
    - apt-get install -y curl tar gzip

  script:
    - mkdir -p /tmp/git-cliff
    - curl -L https://github.com/git-cliff/git-cliff/releases/download/v0.20.0/git-cliff_0.20.0_amd64.tar.gz -o /tmp/git-cliff.tar.gz
    - tar -xzf /tmp/git-cliff.tar.gz -C /tmp/git-cliff
    - chmod +x $(find /tmp/git-cliff -type f -name git-cliff)
    - mv $(find /tmp/git-cliff -type f -name git-cliff) /usr/local/bin/git-cliff
    - git cliff -o CHANGELOG.md

  artifacts:
    when: always
    paths:
      - CHANGELOG.md