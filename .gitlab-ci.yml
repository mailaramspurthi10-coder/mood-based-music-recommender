stages:
  - lint
  - type-check
  - format
  - quality
  - security
  - test

variables:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install -r backend/requirements.txt -r requirements-dev.txt

# ---------------- LINT ----------------
ruff_check:
  stage: lint
  script:
    - python -m ruff --version
    - python -m ruff check .

# ---------------- TYPE CHECK ----------------
mypy_check:
  stage: type-check
  script:
    - python -m mypy backend

# ---------------- FORMAT ----------------
ruff_format_check:
  stage: format
  script:
    - python -m ruff --version
    - python -m ruff format --check .

# ---------------- QUALITY ----------------
quality:
  stage: quality
  script:
    - python -m bandit -r backend --exclude venv,.venv,builds
    - python -m pylint backend --exit-zero
    - python -m flake8 backend --ignore=E203,W503 --exclude=venv,.venv,builds,__pycache__

# ---------------- SECURITY ----------------
gitleaks_secret_scanning:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --redact --verbose

pip_audit_dependency_audit:
  stage: security
  script:
    - pip-audit --disable-pip  # avoids CI cache/env issues
  allow_failure: true

# ---------------- TEST ----------------
pytest:
  stage: test
  script:
    - pytest --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80
  artifacts:
    when: always
    paths:
      - coverage.xml
  coverage: '/TOTAL.*\s+(\d+)%/'