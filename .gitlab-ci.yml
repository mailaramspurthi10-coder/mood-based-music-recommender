stages:
  - lint
  - type-check
  - format
  - quality
  - security
  - test

variables:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install -r backend/requirements.txt -r requirements-dev.txt

# ---------------- LINT ----------------
ruff_check:
  stage: lint
  script:
    - python -m ruff --version
    - python -m ruff check .

# ---------------- TYPE CHECK ----------------
mypy_check:
  stage: type-check
  script:
    - python -m mypy backend

# ---------------- FORMAT ----------------
ruff_format_check:
  stage: format
  script:
    - python -m ruff --version
    - python -m ruff format --check .

# ---------------- QUALITY ----------------
quality:
  stage: quality
  script:
    - echo "Running Bandit..."
    - python -m bandit -r backend --exclude venv,.venv,builds

    - echo "Running Pylint..."
    - python -m pylint backend --exit-zero

    - echo "Running Flake8..."
    - python -m flake8 backend --ignore=E203,W503 --exclude=venv,.venv,builds,__pycache__

# ---------------- SECURITY ----------------
gitleaks_secret_scanning:
  stage: security
  script:
    - powershell -Command "Invoke-WebRequest -Uri https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_windows_x64.zip -OutFile gitleaks.zip"
    - powershell -Command "Expand-Archive -Path gitleaks.zip -DestinationPath gitleaks"
    - gitleaks\gitleaks.exe detect --source . --config .gitleaks.toml --redact
    
pip_audit_dependency_audit:
  stage: security
  script:
    - pip-audit

# ---------------- TEST ----------------
pytest:
  stage: test
  script:
    - pytest --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80

  artifacts:
    when: always
    paths:
      - coverage.xml

  coverage: '/TOTAL.*\s+(\d+)%/'